# Prospector Dongle Screen Configuration for Flake S (ZMK main / Zephyr 4.1)

# Layout: information-dense OPERATOR screen
CONFIG_PROSPECTOR_STATUS_SCREEN_OPERATOR=y

# Modifier display: Mac-style labels (CMD/OPT/CTRL/SHFT)
CONFIG_PROSPECTOR_MODIFIER_OS_MAC=y
CONFIG_PROSPECTOR_SHOW_MODIFIERS=y

# Ambient light sensor (APDS9960) for automatic brightness adjustment
CONFIG_PROSPECTOR_USE_AMBIENT_LIGHT_SENSOR=y

# Keyboard-driven brightness control (F24=up, F23=down, F22=toggle)
CONFIG_PROSPECTOR_BRIGHTNESS_KEYBOARD_CONTROL=y

# Layer names in natural case (base/nav/num/sym/fn)
CONFIG_PROSPECTOR_LAYER_NAME_UPPERCASE=n

# ZMK Studio on the dongle (central + USB)
CONFIG_ZMK_STUDIO=y

# Dongle name
CONFIG_ZMK_KEYBOARD_NAME="Flake Dongle"
