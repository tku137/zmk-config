# Power management
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_BLE_EXPERIMENTAL_FEATURES=y
CONFIG_ZMK_BLE_PASSKEY_ENTRY=n
CONFIG_ZMK_PM_SOFT_OFF=y
# Timeout till idle state 3 minutes
CONFIG_ZMK_IDLE_TIMEOUT=180000
# Timeout till deep-sleep 30 minutes
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=1800000

# Name it nicely
CONFIG_USB_DEVICE_MANUFACTURER="AnyWhy Flake S"
CONFIG_ZMK_KEYBOARD_NAME="DeckInputV4" # BT name
CONFIG_USB_DEVICE_PRODUCT="DeckInputV4" # USB name

# Note: ZMK Studio runs on the dongle (central), not the halves (peripherals).
# See config/anywhy_flake_dongle.conf for Studio config.
