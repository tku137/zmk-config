# Build configuration for Flake S with Prospector dongle (ZMK main / Zephyr 4.1)
---
include:
  # Left peripheral
  - board: nice_nano//zmk
    shield: anywhy_flake_left
    artifact-name: flake-left

  # Right peripheral
  - board: nice_nano//zmk
    shield: anywhy_flake_right
    artifact-name: flake-right

  # Dongle with Prospector OPERATOR screen + ZMK Studio (central)
  - board: xiao_ble//zmk
    shield: anywhy_flake_dongle prospector_adapter
    snippet: studio-rpc-usb-uart
    cmake-args: -DCONFIG_ZMK_STUDIO=y
    artifact-name: flake-dongle

  # Settings reset for all boards
  - board: xiao_ble//zmk
    shield: settings_reset
    artifact-name: reset-dongle
  - board: nice_nano//zmk
    shield: settings_reset
    artifact-name: reset-flake
